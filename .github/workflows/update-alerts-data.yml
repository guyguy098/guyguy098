name: Update Alert History Data

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:          # Manual trigger

permissions:
  contents: write

jobs:
  update-alerts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch alert history
        run: node scripts/update-alerts-data.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/alert-history.json data/telegram-idf.json
          git diff --cached --quiet || git commit -m "Auto-update alert history [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
